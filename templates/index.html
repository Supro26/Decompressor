<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decompressor</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="logo">
        <!-- unzip icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <div>
        <h1>Decompressor</h1>
        <p>Recursive archive extractor — zip · tar · gz · bz2 · xz</p>
      </div>
    </div>

    <!-- Body -->
    <div class="card-body">

      <!-- Drop zone -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="*/*" />
        <div class="drop-icon">📦</div>
        <div class="primary-label">Drop your archive here</div>
        <div class="secondary-label">or click to browse</div>
      </div>

      <!-- Selected file info -->
      <div id="file-info">
        <span class="fi-icon">📄</span>
        <span id="file-name">—</span>
        <button id="clear-file" title="Remove file">✕</button>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="submit-btn" disabled>
        Decompress
      </button>

      <!-- Error banner -->
      <div id="error-banner"></div>

      <!-- Log panel -->
      <div id="log-panel">
        <div class="log-header">
          <span id="log-status">Processing…</span>
          <div class="log-dot" id="log-dot"></div>
        </div>
        <div id="log-output"></div>
      </div>

      <!-- Download link -->
      <a id="download-btn" href="#" download="decompressed_result.zip">
        ⬇ Download Result
      </a>

    </div>
  </div>


  <script>
    let selectedFile = null;
    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const fileInfo    = document.getElementById('file-info');
    const fileName    = document.getElementById('file-name');
    const clearBtn    = document.getElementById('clear-file');
    const submitBtn   = document.getElementById('submit-btn');
    const logPanel    = document.getElementById('log-panel');
    const logOutput   = document.getElementById('log-output');
    const logStatus   = document.getElementById('log-status');
    const downloadBtn = document.getElementById('download-btn');
    const errorBanner = document.getElementById('error-banner');

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    ['dragleave', 'drop'].forEach(evt =>
      dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'))
    );

    dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (!files.length) return;
 selectedFile = files[0];  

  setFile(files[0]);
});

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      fileName.textContent = file.name;
      fileInfo.classList.add('visible');
      submitBtn.disabled = false;
      resetUI();
    }

    clearBtn.addEventListener('click', () => {
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      fileName.textContent = '—';
      submitBtn.disabled = true;
      resetUI();
    });

    function resetUI() {
      logPanel.classList.remove('visible', 'done');
      logOutput.innerHTML = '';
      logStatus.textContent = 'Processing…';
      downloadBtn.classList.remove('visible');
      downloadBtn.href = '#';
      errorBanner.classList.remove('visible');
      errorBanner.textContent = '';
    }

    function appendLogLine(text) {
      const span = document.createElement('span');
      if (text.startsWith('[+]'))      span.className = 'line-plus';
      else if (text.startsWith('[!]')) span.className = 'line-warn';
      else if (text.startsWith('[-]')) span.className = 'line-error';
      else if (text.startsWith('──')) span.className = 'line-sep';
      span.textContent = text + '\n';
      logOutput.appendChild(span);
      logOutput.scrollTop = logOutput.scrollHeight;
    }

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      resetUI();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing…';
      logPanel.classList.add('visible');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        /* Call the JSON log endpoint first to get progress lines */
        const logRes = await fetch('/upload/log', {
          method: 'POST',
          body: formData,
        });

        const data = await logRes.json();

        if (!logRes.ok || data.error) {
          throw new Error(data.error || 'Server error');
        }

        /* Render log lines */
        (data.log || []).forEach(appendLogLine);

        /* Fetch the actual file using the session download URL */
        const fileRes = await fetch(data.download_url);
        if (!fileRes.ok) throw new Error('Could not fetch result file.');

        const blob = await fileRes.blob();
        const objUrl = URL.createObjectURL(blob);

        downloadBtn.href = objUrl;
        downloadBtn.classList.add('visible');

        logPanel.classList.add('done');
        logStatus.textContent = 'Done';

      } catch (err) {
        errorBanner.textContent = '⚠ ' + err.message;
        errorBanner.classList.add('visible');
        logPanel.classList.add('done');
        logStatus.textContent = 'Failed';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Decompress';
      }
    });
  </script>

</body>
</html>
